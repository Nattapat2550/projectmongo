<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Code - App</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav id="navbar">
        <div class="nav-left">App Logo</div>
        <div class="nav-right" id="nav-right">
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
            <a href="login.html">Login</a>
        </div>
        <div class="profile-dropdown" id="profile-dropdown" style="display:none;">
            <img id="avatar" src="/images/user.png" alt="Avatar">
            <span id="username-nav"></span>
            <div class="dropdown-menu">
                <a href="settings.html">Settings</a>
                <button id="logout-btn">Logout</button>
            </div>
        </div>
    </nav>
    <main>
        <h1>Verify Your Email</h1>
        <form id="check-form">
            <label for="email">Email:</label>
            <input type="email" id="email" readonly>
            <label for="code">Verification Code (6 digits):</label>
            <input type="text" id="code" maxlength="6" required>
            <button type="submit">Verify</button>
        </form>
        <p id="message"></p>
        <a href="register.html">Resend Code</a>
    </main>
    <script src="js/main.js"></script>
    <script src="js/check.js"></script>
</body>
</html>
