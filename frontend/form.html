<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complete Profile - App</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav id="navbar">
        <div class="nav-left">App Logo</div>
        <div class="nav-right" id="nav-right">
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
            <a href="login.html">Login</a>
        </div>
        <div class="profile-dropdown" id="profile-dropdown" style="display:none;">
            <img id="avatar" src="/images/user.png" alt="Avatar">
            <span id="username-nav"></span>
            <div class="dropdown-menu">
                <a href="settings.html">Settings</a>
                <button id="logout-btn">Logout</button>
            </div>
        </div>
    </nav>
    <main>
        <h1>Complete Your Profile</h1>
        <form id="form-form">
            <label for="email">Email:</label>
            <input type="email" id="email" readonly>
            <label for="username">Username:</label>
            <input type="text" id="username" required minlength="3" maxlength="30">
            <label for="password">Password:</label>
            <input type="password" id="password" required minlength="8">
            <label>
                <input type="checkbox" id="hide-password"> Hide password
            </label>
            <label for="confirm-password">Confirm Password:</label>
            <input type="password" id="confirm-password" required minlength="8">
            <button type="submit">Complete Profile</button>
        </form>
        <p id="message"></p>
    </main>
    <script src="js/main.js"></script>
    <script src="js/form.js"></script>
</body>
</html>
